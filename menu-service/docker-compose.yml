version: '3.8'

services:
  postgres:
    image: postgres:15-alpine 
    container_name: menu_postgres
    environment:
      POSTGRES_USER: coffee_user      
      POSTGRES_PASSWORD: coffee_password 
      POSTGRES_DB: menu_db           
    ports:
      - "5432:5432" 
    volumes:
      - ./deploy/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: